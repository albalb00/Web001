  .hamburger:active{

  .hamburger span{
    display:block;
    width:100%;
    height:3px;
    background:white;
    border-radius:2px;
    transition:0.3s ease;
    transform-origin:center;
  }

  /* GARIS 1 */
  .hamburger.active span:nth-child(1){
    transform:

      rotate(45deg);
  }

  /* GARIS 2 */
  .hamburger.active span:nth-child(2){
    opacity:0;
  }

  /* GARIS 3 */
  .hamburger.active span:nth-child(3){
    transform:
      translateY(-6px)
      rotate(-45deg);

    }

      color:#f5a623;
    }

    .mobile-menu a:active{
      transform:scale(0.95);

.dot{

  width:10px;
  height:10px;

  border-radius:999px;

  background:#94a3b8;

  transition:all 0.35s ease;

}


/* TABLET */
@media (min-width:640px){

  .dot{
    width:12px;
    height:12px;
  }

}


/* DESKTOP */

}

<script>

const hamburger = document.getElementById("hamburger");
const mobileMenu = document.getElementById("mobileMenu");

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("active");
  mobileMenu.classList.toggle("active");
});




/* =========================
   CAROUSEL
========================= */

const track = document.getElementById("carouselTrack");
const carouselContainer = document.getElementById("carouselContainer");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const dots = document.querySelectorAll(".dot");

const slides = document.querySelectorAll(".carousel-item");

let currentIndex = 0;

let startX = 0;
let endX = 0;

let isScrolling = false;



function updateCarousel(){

  const slideWidth =
    slides[0].offsetWidth;

  const screenWidth =
    window.innerWidth;



  /* CENTER ACTIVE IMAGE */
  const offset =
    (screenWidth / 2)
    -
    (slideWidth / 2)
    -
    (currentIndex * slideWidth);




  track.style.transform =
    `translateX(${offset}px)`;



  /* DOT ACTIVE */
  dots.forEach((dot, index)=>{

    if(index === currentIndex){

      dot.classList.add("active-dot");

    }

    else{

      dot.classList.remove("active-dot");

    }

  });




  /* HIDE LEFT */
  if(currentIndex === 0){

    prevBtn.style.opacity = "0";
    prevBtn.style.pointerEvents = "none";

  }

  else{

    prevBtn.style.opacity = "1";
    prevBtn.style.pointerEvents = "auto";

  }




  /* HIDE RIGHT */
  if(currentIndex === slides.length - 1){

    nextBtn.style.opacity = "0";
    nextBtn.style.pointerEvents = "none";

  }

  else{

    nextBtn.style.opacity = "1";
    nextBtn.style.pointerEvents = "auto";

  }

}




/* NEXT */
nextBtn.addEventListener("click", ()=>{

  if(currentIndex < slides.length - 1){

    currentIndex++;

    updateCarousel();

  }

});




/* PREV */
prevBtn.addEventListener("click", ()=>{

  if(currentIndex > 0){

    currentIndex--;

    updateCarousel();

  }

});




/* DOT CLICK */
dots.forEach((dot, index)=>{

  dot.addEventListener("click", ()=>{

    currentIndex = index;

    updateCarousel();

  });

});




/* RESIZE */
window.addEventListener("resize", ()=>{

  updateCarousel();

});



/* =========================
   MOBILE / TABLET SWIPE
========================= */

let touchStartX = 0;

let touchStartY = 0;



carouselContainer.addEventListener("touchstart", (e)=>{

  /*
    Kalau lebih dari 1 jari,
    jangan aktifkan swipe carousel
  */
  if(e.touches.length > 1){
    return;
  }



  touchStartX = e.touches[0].clientX;

  touchStartY = e.touches[0].clientY;

}, { passive:true });





carouselContainer.addEventListener("touchend", (e)=>{

  /*
    Kalau pinch / multi touch,
    jangan swipe carousel
  */
  if(e.changedTouches.length > 1){
    return;
  }



  const touchEndX =
    e.changedTouches[0].clientX;

  const touchEndY =
    e.changedTouches[0].clientY;




  const deltaX =
    touchStartX - touchEndX;

  const deltaY =
    touchStartY - touchEndY;




  /*
    Kalau vertical swipe lebih dominan,
    anggap scroll page biasa
  */
  if(Math.abs(deltaY) > Math.abs(deltaX)){
    return;
  }




  /*
    SWIPE LEFT → NEXT
  */
  if(deltaX > 45){

    if(currentIndex < slides.length - 1){

      currentIndex++;

      updateCarousel();

    }

  }




  /*
    SWIPE RIGHT → PREV
  */
  else if(deltaX < -45){

    if(currentIndex > 0){

      currentIndex--;

      updateCarousel();

    }

  }

}, { passive:true });









/* =========================
   TRACKPAD SWIPE
========================= */

let lastSwipeTime = 0;

const SWIPE_COOLDOWN = 420;

const SWIPE_THRESHOLD = 45;



track.addEventListener("wheel", (e)=>{

  /*
    Kalau vertical scroll lebih dominan,
    biarkan page scroll normal
  */
  if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
    return;
  }



  /*
    Block horizontal swipe browser
  */
  e.preventDefault();




  const now = Date.now();




  /*
    Prevent multiple slide
    dalam 1 gesture
  */
  if(now - lastSwipeTime < SWIPE_COOLDOWN){
    return;
  }




  /*
    SWIPE LEFT → NEXT
  */
  if(e.deltaX > SWIPE_THRESHOLD){

    if(currentIndex < slides.length - 1){

      currentIndex++;

      updateCarousel();

      lastSwipeTime = now;

    }

  }




  /*
    SWIPE RIGHT → PREV
  */
  else if(e.deltaX < -SWIPE_THRESHOLD){

    if(currentIndex > 0){

      currentIndex--;

      updateCarousel();

      lastSwipeTime = now;

    }

  }

}, { passive:false });










/* INITIAL */
updateCarousel();




</script>
